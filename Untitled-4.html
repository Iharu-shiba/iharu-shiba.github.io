<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>タップサークルゲーム</title>
<style>
    html, body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: black;
    }
    canvas {
        display: block;
    }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
// ====================
// 初期設定
// ====================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ゲーム変数
let gameState = 'START';
let score = 0;
let lives = 3;
let circles = [];
let spawnTimer = 0;
let spawnInterval = 60;
let particles = [];
let combo = 0;
let comboTimer = 0;

// Best Score
let bestScore = localStorage.getItem('bestScore') || 0;
bestScore = Number(bestScore);

// ====================
// ヘルパー関数
// ====================
function getRandomColor() {
    let r = Math.floor(Math.random()*255),
        g = Math.floor(Math.random()*255),
        b = Math.floor(Math.random()*255);
    return `rgb(${r},${g},${b})`;
}

function hitCircle(x, y, circle) {
    let dx = x - circle.x;
    let dy = y - circle.y;
    return Math.sqrt(dx*dx + dy*dy) < circle.radius;
}

// ====================
// パーティクルクラス
// ====================
class Particle {
    constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.radius = 3 + Math.random()*4;
        this.color = color;
        this.speedX = (Math.random()-0.5)*8;
        this.speedY = (Math.random()-0.5)*8;
        this.life = 1;
        this.decay = 0.02;
    }
    update() {
        this.x += this.speedX;
        this.y += this.speedY;
        this.speedY += 0.2;
        this.life -= this.decay;
    }
    draw() {
        ctx.fillStyle = this.color;
        ctx.globalAlpha = this.life;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
        ctx.fill();
        ctx.globalAlpha = 1;
    }
    isDead() { return this.life <= 0; }
}

function createExplosion(x, y, color) {
    for(let i=0;i<15;i++){
        particles.push(new Particle(x,y,color));
    }
}

// ====================
// サークル生成
// ====================
function spawnCircle() {
    let isBonus = Math.random() < 0.1; // 10%ボーナス
    let newCircle = {
        x: Math.random() * canvas.width,
        y: canvas.height + 50,
        radius: 20 + Math.random()*30,
        color: isBonus ? 'gold' : getRandomColor(),
        speed: 1 + Math.random()*2,
        points: isBonus ? 50 : 10
    };
    circles.push(newCircle);
}

// ====================
// ゲーム更新
// ====================
function updateGame() {
    spawnTimer++;
    if(spawnTimer >= spawnInterval){
        spawnCircle();
        spawnTimer = 0;
    }

    // サークル移動
    for(let i=circles.length-1;i>=0;i--){
        circles[i].y -= circles[i].speed;
        if(circles[i].y < -circles[i].radius){
            circles.splice(i,1);
            lives--;
            if(lives <= 0){
                if(score > bestScore){
                    bestScore = score;
                    localStorage.setItem('bestScore', bestScore);
                }
                gameState='GAME_OVER';
            }
        }
    }

    // パーティクル更新
    for(let i=particles.length-1;i>=0;i--){
        particles[i].update();
        if(particles[i].isDead()) particles.splice(i,1);
    }

    // コンボタイマー
    if(comboTimer>0) comboTimer--; else combo=0;

    // 難易度調整
    if(score>100) spawnInterval=40;
    if(score>200) spawnInterval=30;
    if(score>400) spawnInterval=20;
}

// ====================
// 描画
// ====================
function drawGame(){
    ctx.fillStyle='black';
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // サークル描画
    for(let c of circles){
        ctx.fillStyle=c.color;
        ctx.beginPath();
        ctx.arc(c.x,c.y,c.radius,0,Math.PI*2);
        ctx.fill();
        ctx.fillStyle='white';
        ctx.textAlign='center';
        ctx.textBaseline='middle';
        ctx.font='bold 16px Arial';
        ctx.fillText(c.points,c.x,c.y);
    }

    // パーティクル描画
    for(let p of particles) p.draw();

    // UI
    ctx.fillStyle='white';
    ctx.font='bold 24px Arial';
    ctx.textAlign='left';
    ctx.fillText('Score: '+score,20,40);
    ctx.textAlign='right';
    ctx.fillText('Lives: '+lives,canvas.width-20,40);

    // Best Score 右上に目立たせる
    ctx.font='bold 28px Arial';
    ctx.fillStyle='gold';
    ctx.fillText('Best: '+bestScore, canvas.width-20, 80);

    // コンボ
    ctx.textAlign='center';
    ctx.fillStyle='white';
    ctx.fillText('Combo: '+combo,canvas.width/2,40);
}

function drawStartScreen(){
    ctx.fillStyle='black';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='white';
    ctx.font='bold 48px Arial';
    ctx.textAlign='center';
    ctx.fillText('TAP TO START',canvas.width/2,canvas.height/2);
    ctx.font='20px Arial';
    ctx.fillText('Tap the circles before they escape!',canvas.width/2,canvas.height/2+60);
}

function drawGameOverScreen(){
    ctx.fillStyle='black';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='white';
    ctx.font='bold 48px Arial';
    ctx.textAlign='center';
    ctx.fillText('GAME OVER',canvas.width/2,canvas.height/2-60);

    ctx.font='32px Arial';
    ctx.fillText('Score: '+score,canvas.width/2,canvas.height/2);
    ctx.fillText('Best: '+bestScore,canvas.width/2,canvas.height/2+50);

    // 右上にも表示
    ctx.font='bold 28px Arial';
    ctx.fillStyle='gold';
    ctx.textAlign='right';
    ctx.fillText('Best: '+bestScore, canvas.width-20, 80);

    ctx.font='24px Arial';
    ctx.fillStyle='white';
    ctx.textAlign='center';
    ctx.fillText('TAP TO PLAY AGAIN',canvas.width/2,canvas.height/2+100);
}

// ====================
// 入力処理（タッチ & マウス）
// ====================
function handleInput(x,y){
    if(gameState==='START' || gameState==='GAME_OVER'){
        startGame();
    } else if(gameState==='PLAYING'){
        for(let i=circles.length-1;i>=0;i--){
            if(hitCircle(x,y,circles[i])){
                combo++;
                comboTimer = 60;
                score += circles[i].points*combo;
                createExplosion(circles[i].x,circles[i].y,circles[i].color);
                circles.splice(i,1);
                break;
            }
        }
    }
}

canvas.addEventListener('touchstart',e=>{
    e.preventDefault();
    let t = e.touches[0];
    handleInput(t.clientX,t.clientY);
});

canvas.addEventListener('mousedown',e=>{
    handleInput(e.clientX,e.clientY);
});

// ====================
// ゲーム開始
// ====================
function startGame(){
    gameState='PLAYING';
    score=0;
    lives=3;
    circles=[];
    spawnTimer=0;
    combo=0;
    comboTimer=0;
}

// ====================
// メインループ
// ====================
function gameLoop(){
    if(gameState==='START') drawStartScreen();
    else if(gameState==='PLAYING'){
        updateGame();
        drawGame();
    } else if(gameState==='GAME_OVER'){
        drawGameOverScreen();
    }
    requestAnimationFrame(gameLoop);
}

gameLoop();

// ====================
// ウィンドウリサイズ対応
// ====================
window.addEventListener('resize',()=>{
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>
</body>
</html>
